<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>App Tester</title>
  <meta name="description" content="Earn rewards for your screen time." />
  <meta name="theme-color" content="#0a0820" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%237c5cff' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%234dd4d6'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0a0820;
      --purple: #7c5cff;
      --purple-2: #9b82ff;
      --cyan: #4dd4d6;
      --text: #ffffff;
      --muted: #9ea0c2;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      top: -300px;
      right: -300px;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(124,92,255,.22) 0%, transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: "";
      position: absolute;
      bottom: -300px;
      left: -300px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(77,212,214,.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .splash {
      position: relative;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .logo {
      width: 96px; height: 96px;
      margin: 0 auto 32px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, var(--cyan) 0 18%, transparent 18.5%),
        radial-gradient(circle at 50% 50%, transparent 38%, var(--purple) 38.5% 44%, transparent 44.5%);
      transform: rotate(15deg);
      box-shadow: 0 20px 60px -10px rgba(124,92,255,.4);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 20px 60px -10px rgba(124,92,255,.4); }
      50% { box-shadow: 0 25px 70px -10px rgba(124,92,255,.65); }
    }
    .brand-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--purple-2), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 16px;
    }
    .tagline {
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 600;
      line-height: 1.3;
      color: white;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
    }
    .tagline strong {
      background: linear-gradient(90deg, var(--purple-2), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }
    .sub {
      color: var(--muted);
      font-size: 15px;
      margin: 0 0 44px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--purple);
      color: white;
      padding: 20px 48px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 40px -10px rgba(124,92,255,.55);
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
      letter-spacing: -0.01em;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 50px -10px rgba(124,92,255,.7); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .7; cursor: progress; }
    .footnote {
      margin-top: 22px;
      font-size: 12px;
      color: var(--muted);
    }
    .footnote a { color: var(--muted); text-decoration: underline; }
    .footnote a:hover { color: white; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo" aria-hidden="true"></div>
    <h1 class="brand-name">App Tester</h1>
    <p class="tagline">Earn rewards for your <strong>screen time</strong>.</p>
    <p class="sub">Free to join · US residents 18+</p>
    <button class="btn" id="go" type="button">Get Started →</button>
    <p class="footnote">
      *<a href="/terms">Terms apply</a> · <a href="/privacy">Privacy</a>
    </p>
  </div>

  <script>
    var ROTATOR = "https://trk.ssaff.link/mb-32298";
    var BRAND_SLUG = "ato";

    function readCookie(name){
      var m = document.cookie.match(new RegExp('(^|; )' + name + '=([^;]*)'));
      return m ? decodeURIComponent(m[2]) : null;
    }

    document.getElementById('go').onclick = function(){
      var btn = this;
      btn.disabled = true; btn.textContent = 'Loading…';
      var cmcVid = readCookie('cmc_vid') || (window.clickmagick_cmc && window.clickmagick_cmc.vid) || null;
      var href = cmcVid
        ? ROTATOR + '/' + cmcVid + '/' + BRAND_SLUG
        : ROTATOR + '/' + BRAND_SLUG;
      try { if(window.fbq) window.fbq('track','Lead',{content_name:'apptester_splash_cta'}); } catch(e){}
      window.location.href = href;
    };
  </script>
</body>
</html>
